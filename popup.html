<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UltraVPN Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg0: #070a14;
  --bg1: #0d1220;
  --bg2: #121829;
  --bg3: #1a2238;
  --border: #1e2d4a;
  --cyan: #00e5ff;
  --cyan-dim: rgba(0,229,255,0.12);
  --cyan-glow: rgba(0,229,255,0.35);
  --green: #00ff88;
  --green-dim: rgba(0,255,136,0.12);
  --red: #ff4466;
  --red-dim: rgba(255,68,102,0.12);
  --amber: #ffaa00;
  --text: #e2e8f0;
  --text-dim: #7a8fad;
  --text-muted: #3a4f6e;
  --radius: 10px;
  --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  width: 390px;
  min-height: 580px;
  background: var(--bg0);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  overflow-x: hidden;
  position: relative;
}

/* ── Scanline background ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,255,0.012) 2px, rgba(0,229,255,0.012) 4px);
  pointer-events: none;
  z-index: 0;
}

/* ── Grid noise overlay ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(ellipse at 50% 0%, rgba(0,229,255,0.06) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.shell { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100%; }

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(0,229,255,0.04) 0%, transparent 100%);
}
.logo {
  display: flex;
  align-items: center;
  gap: 9px;
}
.logo-icon {
  width: 30px;
  height: 30px;
  position: relative;
}
.logo-icon svg { width: 100%; height: 100%; }
.logo-text {
  font-family: 'Orbitron', monospace;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--cyan);
  line-height: 1;
}
.logo-sub {
  font-family: 'Orbitron', monospace;
  font-size: 8px;
  font-weight: 400;
  color: var(--text-dim);
  letter-spacing: 0.2em;
  display: block;
  margin-top: 2px;
}
.header-actions { display: flex; gap: 8px; align-items: center; }
.icon-btn {
  width: 30px; height: 30px;
  border: 1px solid var(--border);
  background: var(--bg2);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: var(--transition);
  color: var(--text-dim);
}
.icon-btn:hover { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-dim); }
.icon-btn svg { width: 14px; height: 14px; }

/* ── Status pill ── */
.status-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.15em;
  border: 1px solid;
  transition: var(--transition);
}
.status-pill.disconnected { border-color: var(--red); color: var(--red); background: var(--red-dim); }
.status-pill.connected { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.status-pill.connecting { border-color: var(--amber); color: var(--amber); background: rgba(255,170,0,0.12); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.status-pill.connected .status-dot { animation: pulse-dot 2s ease-in-out infinite; }
@keyframes pulse-dot { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.7); } }

/* ── Connection hub ── */
.connection-hub {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 18px 16px;
  position: relative;
  overflow: hidden;
}

/* Radial glow behind button */
.hub-glow {
  position: absolute;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,229,255,0.08) 0%, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  transition: var(--transition);
  pointer-events: none;
}
.connected-state .hub-glow { background: radial-gradient(circle, rgba(0,255,136,0.15) 0%, transparent 70%); }

/* Main connect button */
.connect-btn-wrap { position: relative; margin-bottom: 16px; }

.connect-rings {
  position: absolute;
  inset: -16px;
  border-radius: 50%;
  pointer-events: none;
}
.connect-rings .ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid;
  inset: 0;
  opacity: 0;
}
.connect-rings .ring-1 { border-color: rgba(0,229,255,0.3); }
.connect-rings .ring-2 { border-color: rgba(0,229,255,0.2); inset: -10px; }
.connect-rings .ring-3 { border-color: rgba(0,229,255,0.1); inset: -20px; }

.connected-state .ring { animation: expand-ring 3s ease-out infinite; }
.connected-state .ring-1 { animation-delay: 0s; }
.connected-state .ring-2 { animation-delay: 0.8s; }
.connected-state .ring-3 { animation-delay: 1.6s; }

@keyframes expand-ring {
  0% { transform: scale(1); opacity: 0.6; }
  100% { transform: scale(1.6); opacity: 0; }
}

.connect-btn {
  width: 92px; height: 92px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--bg2);
  cursor: pointer;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
}

.connect-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: conic-gradient(from 0deg, transparent 60%, rgba(0,229,255,0.15) 100%);
  animation: spin-ring 4s linear infinite;
  opacity: 0;
  transition: opacity 0.3s;
}
.connect-btn:hover::before,
.connecting-state .connect-btn::before { opacity: 1; }
@keyframes spin-ring { to { transform: rotate(360deg); } }

.connect-btn:hover { border-color: var(--cyan); background: var(--bg3); transform: scale(1.05); }
.connect-btn:active { transform: scale(0.97); }

.disconnected-state .connect-btn { border-color: var(--border); }
.connected-state .connect-btn { border-color: var(--green); background: rgba(0,255,136,0.07); box-shadow: 0 0 28px rgba(0,255,136,0.2), inset 0 0 20px rgba(0,255,136,0.05); }
.connecting-state .connect-btn { border-color: var(--amber); }
.connecting-state .connect-btn::before { opacity: 1; }

.btn-icon { transition: var(--transition); }
.btn-icon svg { width: 28px; height: 28px; }
.disconnected-state .btn-icon { color: var(--text-dim); }
.connected-state .btn-icon { color: var(--green); filter: drop-shadow(0 0 6px rgba(0,255,136,0.6)); }
.connecting-state .btn-icon { color: var(--amber); animation: spin-once 1.2s linear infinite; }
@keyframes spin-once { to { transform: rotate(360deg); } }

.btn-label {
  font-family: 'Orbitron', monospace;
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  transition: var(--transition);
}
.connected-state .btn-label { color: var(--green); }
.connecting-state .btn-label { color: var(--amber); }

/* ── IP Info card ── */
.ip-card {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 4px;
  transition: var(--transition);
}
.ip-card.protected { border-color: rgba(0,255,136,0.3); background: rgba(0,255,136,0.04); }
.ip-flag { font-size: 22px; line-height: 1; min-width: 26px; }
.ip-data { flex: 1; min-width: 0; }
.ip-address {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.04em;
}
.ip-meta {
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}
.ip-shield { color: var(--text-muted); }
.ip-card.protected .ip-shield { color: var(--green); }
.ip-shield svg { width: 18px; height: 18px; }

/* ── Session timer ── */
.session-bar {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 2px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
}
.session-timer { color: var(--green); letter-spacing: 0.08em; }
.session-country { display: flex; align-items: center; gap: 5px; }

/* ── Tab bar ── */
.tab-bar {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--bg1);
  padding: 0 8px;
}
.tab-btn {
  flex: 1;
  padding: 9px 4px;
  font-family: 'Orbitron', monospace;
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: var(--text-dim);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: var(--transition);
  text-align: center;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }

/* ── Panels ── */
.panel { display: none; flex-direction: column; flex: 1; }
.panel.active { display: flex; }

/* ── Country search ── */
.search-wrap {
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: center;
}
.search-field {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 7px 10px 7px 32px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: var(--transition);
  position: relative;
}
.search-field:focus { border-color: var(--cyan); background: var(--bg3); }
.search-field::placeholder { color: var(--text-muted); }

/* Continent filter */
.continent-filters {
  padding: 6px 12px;
  display: flex;
  gap: 5px;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
}
.continent-filters::-webkit-scrollbar { display: none; }
.cf-btn {
  white-space: nowrap;
  padding: 4px 10px;
  border-radius: 20px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  font-weight: 600;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  cursor: pointer;
  transition: var(--transition);
  letter-spacing: 0.04em;
}
.cf-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.cf-btn.active { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }

/* ── FIX #5 — Mullvad status bar (was missing entirely from popup.html).
   updateRelayStatus() in popup.js references #mullvadBadge and
   #mullvadDetail; without these elements it silently returned early on
   every call, so the relay sync status was never shown in the popup. ── */
.mullvad-status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 5px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg1);
  min-height: 28px;
}
.mullvad-badge {
  font-family: 'Orbitron', monospace;
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.12em;
  white-space: nowrap;
  flex-shrink: 0;
}
.mullvad-loading { color: var(--amber); }
.mullvad-ok      { color: var(--green); }
.mullvad-error   { color: var(--red); }
#mullvadDetail {
  font-size: 10px;
  color: var(--text-muted);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* FIX #8 — Style for the refresh button that was also missing ── */
.relay-refresh-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
  padding: 2px 7px;
  transition: var(--transition);
  flex-shrink: 0;
}
.relay-refresh-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.relay-refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── FIX #6 — .ci-mullvad-badge was referenced in popup.js createCountryItem()
   but never defined in CSS, so bridge-count badges rendered as plain unstyled
   text inline with the country name. ── */
.ci-mullvad-badge {
  display: inline-block;
  margin-left: 5px;
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--cyan);
  opacity: 0.8;
  vertical-align: middle;
  letter-spacing: 0.04em;
}

/* ── Country list ── */
.country-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  max-height: 240px; /* reduced slightly to fit mullvad status bar */
}
.country-list::-webkit-scrollbar { width: 4px; }
.country-list::-webkit-scrollbar-track { background: transparent; }
.country-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.country-item {
  display: flex;
  align-items: center;
  padding: 8px 14px;
  gap: 10px;
  cursor: pointer;
  transition: background var(--transition);
  border-left: 2px solid transparent;
  position: relative;
}
.country-item:hover { background: var(--bg2); }
.country-item.selected { background: var(--cyan-dim); border-left-color: var(--cyan); }
.country-item.connected { background: var(--green-dim); border-left-color: var(--green); }

.ci-flag { font-size: 20px; min-width: 28px; line-height: 1; }

.ci-info { flex: 1; min-width: 0; }
.ci-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.02em;
}
.country-item.selected .ci-name { color: var(--cyan); }
.country-item.connected .ci-name { color: var(--green); }
.ci-meta {
  font-size: 10px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 1px;
}
.ci-servers { font-family: 'JetBrains Mono', monospace; }

.ci-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
.ci-ping {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--bg3);
}
.ping-low { color: var(--green); }
.ping-mid { color: var(--amber); }
.ping-high { color: var(--red); }

.ci-fav {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 13px;
  line-height: 1;
  padding: 0;
  transition: var(--transition);
}
.ci-fav:hover { color: var(--amber); }
.ci-fav.active { color: var(--amber); }

/* No results */
.no-results {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  gap: 10px;
  color: var(--text-muted);
}
.no-results svg { width: 36px; height: 36px; opacity: 0.4; }
.no-results p { font-size: 13px; }

/* ── Server select section ── */
.server-select {
  border-top: 1px solid var(--border);
  padding: 8px 12px;
  display: flex;
  gap: 8px;
  align-items: center;
}
.server-info {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 6px 10px;
}
.server-info-label { font-size: 10px; color: var(--text-dim); }
.server-info-val { font-size: 13px; font-weight: 600; color: var(--text); }

.connect-action-btn {
  padding: 8px 18px;
  background: var(--cyan);
  color: var(--bg0);
  border: none;
  border-radius: 7px;
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
}
.connect-action-btn:hover { background: #33eeff; transform: translateY(-1px); }
.connect-action-btn:active { transform: translateY(0); }
.connect-action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Stats panel ── */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 12px;
}
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.stat-label {
  font-family: 'Orbitron', monospace;
  font-size: 8px;
  letter-spacing: 0.15em;
  color: var(--text-dim);
  text-transform: uppercase;
}
.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 600;
  color: var(--cyan);
}
.stat-unit { font-size: 10px; color: var(--text-dim); }

/* DNS leak test */
.leak-test-wrap { padding: 0 12px 12px; }
.leak-test-btn {
  width: 100%;
  padding: 10px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  letter-spacing: 0.04em;
}
.leak-test-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.leak-result {
  margin-top: 8px;
  padding: 10px 12px;
  border-radius: var(--radius);
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  display: none;
}
.leak-result.show { display: block; }
.leak-result.pass { background: var(--green-dim); border: 1px solid rgba(0,255,136,0.3); color: var(--green); }
.leak-result.fail { background: var(--red-dim); border: 1px solid rgba(255,68,102,0.3); color: var(--red); }

/* ── Custom server panel ── */
.custom-panel {
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.field-group { display: flex; flex-direction: column; gap: 4px; }
.field-label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.06em; font-family: 'Orbitron', monospace; }
.field-input, .field-select {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 7px 10px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: var(--transition);
  width: 100%;
}
.field-input:focus, .field-select:focus { border-color: var(--cyan); }
.field-input::placeholder { color: var(--text-muted); }
.field-select option { background: var(--bg2); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.save-server-btn {
  width: 100%;
  padding: 9px;
  background: linear-gradient(135deg, var(--cyan), #0096aa);
  border: none;
  border-radius: 7px;
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--bg0);
  cursor: pointer;
  transition: var(--transition);
}
.save-server-btn:hover { filter: brightness(1.15); transform: translateY(-1px); }

/* Saved servers list */
.saved-servers {
  border-top: 1px solid var(--border);
  max-height: 150px;
  overflow-y: auto;
}
.saved-server-item {
  display: flex;
  align-items: center;
  padding: 7px 12px;
  gap: 8px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background var(--transition);
}
.saved-server-item:hover { background: var(--bg2); }
.ssi-main { flex: 1; }
.ssi-host { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text); }
.ssi-meta { font-size: 10px; color: var(--text-dim); }
.ssi-del { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 14px; transition: var(--transition); }
.ssi-del:hover { color: var(--red); }

/* ── Bottom bar ── */
.bottom-bar {
  border-top: 1px solid var(--border);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg1);
}
.bb-version {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text-muted);
}
.bb-actions { display: flex; gap: 8px; }
.bb-link {
  font-size: 10px;
  color: var(--text-muted);
  cursor: pointer;
  text-decoration: none;
  transition: var(--transition);
  letter-spacing: 0.04em;
}
.bb-link:hover { color: var(--cyan); }

/* ── Toast ── */
#toast {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  opacity: 0;
  transition: all 0.3s;
  z-index: 9999;
  pointer-events: none;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.success { border-color: var(--green); color: var(--green); }
#toast.error { border-color: var(--red); color: var(--red); }

/* ── Loading shimmer ── */
.shimmer {
  background: linear-gradient(90deg, var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 4px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ── Animations ── */
@keyframes fadeSlideIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
.country-item { animation: fadeSlideIn 0.15s ease both; }
</style>
</head>
<body>

<div class="shell" id="shell">

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="15" cy="15" r="14" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>
          <circle cx="15" cy="15" r="11" stroke="#00e5ff" stroke-width="1"/>
          <path d="M15 4 L23 9 L23 18 L15 26 L7 18 L7 9 Z" fill="rgba(0,229,255,0.15)" stroke="#00e5ff" stroke-width="1.2"/>
          <rect x="12" y="15" width="6" height="7" rx="1" fill="#00e5ff" opacity="0.9"/>
          <path d="M12.5 15 Q12.5 11 15 11 Q17.5 11 17.5 15" stroke="#00e5ff" stroke-width="1.5" fill="none"/>
          <circle cx="15" cy="18" r="1" fill="#080b16"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">ULTRAVPN<span style="color:#7a8fad"> PRO</span></div>
        <span class="logo-sub">SECURE TUNNEL v2.1</span>
      </div>
    </div>
    <div class="header-actions">
      <div class="status-pill disconnected" id="statusPill">
        <div class="status-dot"></div>
        <span id="statusText">OFFLINE</span>
      </div>
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="8" cy="8" r="2.5"/>
          <path d="M8 1.5v1.3M8 13.2v1.3M1.5 8h1.3M13.2 8h1.3M3.3 3.3l.9.9M11.8 11.8l.9.9M3.3 12.7l.9-.9M11.8 4.2l.9-.9"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Connection Hub -->
  <div class="connection-hub disconnected-state" id="hubSection">
    <div class="hub-glow"></div>

    <!-- Main button -->
    <div class="connect-btn-wrap">
      <div class="connect-rings">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
      </div>
      <button class="connect-btn" id="mainConnectBtn">
        <div class="btn-icon" id="btnIcon">
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="14" cy="14" r="12" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
            <path d="M14 4 L21 9 L21 20 L14 24 L7 20 L7 9 Z" fill="rgba(122,143,173,0.1)" stroke="currentColor" stroke-width="1.5"/>
            <rect x="11" y="14" width="6" height="8" rx="1.5" fill="currentColor" opacity="0.9"/>
            <path d="M11.5 14 Q11.5 10 14 10 Q16.5 10 16.5 14" stroke="currentColor" stroke-width="2" fill="none"/>
            <circle cx="14" cy="18" r="1.2" fill="#070a14"/>
          </svg>
        </div>
        <div class="btn-label" id="btnLabel">CONNECT</div>
      </button>
    </div>

    <!-- IP card -->
    <div class="ip-card" id="ipCard">
      <div class="ip-flag" id="ipFlag">🌐</div>
      <div class="ip-data">
        <div class="ip-address" id="ipAddress">Fetching IP…</div>
        <div class="ip-meta" id="ipMeta">—</div>
      </div>
      <div class="ip-shield" id="ipShield">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M10 2 L18 6 L18 12 Q18 16 10 19 Q2 16 2 12 L2 6 Z" stroke-width="1.5"/>
        </svg>
      </div>
    </div>

    <!-- Session info -->
    <div class="session-bar" id="sessionBar" style="opacity:0.4">
      <span id="sessionTimer">00:00:00</span>
      <span class="session-country" id="sessionCountry">—</span>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="countries">COUNTRIES</button>
    <button class="tab-btn" data-tab="servers">MY SERVERS</button>
    <button class="tab-btn" data-tab="stats">STATS</button>
  </div>

  <!-- Panel: Countries -->
  <div class="panel active" id="panel-countries">

    <!-- Search -->
    <div class="search-wrap" style="position:relative;">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"
           style="position:absolute;left:22px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--text-muted);pointer-events:none;">
        <circle cx="6.5" cy="6.5" r="5"/>
        <path d="M11 11 L14 14"/>
      </svg>
      <input type="text" class="search-field" id="countrySearch" placeholder="Search country or city…" autocomplete="off">
    </div>

    <!-- Continent filters -->
    <div class="continent-filters">
      <button class="cf-btn active" data-continent="All">All</button>
      <button class="cf-btn" data-continent="Americas">Americas</button>
      <button class="cf-btn" data-continent="Europe">Europe</button>
      <button class="cf-btn" data-continent="Asia Pacific">Asia Pacific</button>
      <button class="cf-btn" data-continent="Middle East">Middle East</button>
      <button class="cf-btn" data-continent="Africa">Africa</button>
      <button class="cf-btn" data-continent="Favorites">⭐ Favorites</button>
    </div>

    <!--
      FIX #5 + FIX #8 — Mullvad status bar was completely missing from
      popup.html. popup.js's updateRelayStatus() looked for #mullvadBadge
      and #mullvadDetail, found nothing, and silently returned early on
      every call — so the relay sync status was never visible.
      Also added #refreshRelaysBtn here so bindEvents() can bind it;
      previously bindEvents() found null and the manual refresh button
      in the popup was dead.
    -->
    <div class="mullvad-status-bar">
      <span class="mullvad-badge mullvad-loading" id="mullvadBadge">⟳ SYNCING MULLVAD</span>
      <span id="mullvadDetail">Fetching live server list…</span>
      <button class="relay-refresh-btn" id="refreshRelaysBtn" title="Refresh Mullvad relay list">↺</button>
    </div>

    <!-- Country list -->
    <div class="country-list" id="countryList"></div>

    <!-- Server select + connect -->
    <div class="server-select" id="serverSelectBar">
      <div class="server-info">
        <div class="server-info-label">SELECTED SERVER</div>
        <div class="server-info-val" id="selectedServerLabel">Choose a country above</div>
      </div>
      <button class="connect-action-btn" id="connectActionBtn" disabled>CONNECT</button>
    </div>

  </div>

  <!-- Panel: My Servers -->
  <div class="panel" id="panel-servers">
    <div class="custom-panel">
      <div style="font-family:'Orbitron',monospace;font-size:9px;letter-spacing:0.15em;color:var(--text-dim);margin-bottom:2px;">ADD CUSTOM SERVER</div>

      <div class="field-row">
        <div class="field-group">
          <label class="field-label">HOST / IP</label>
          <input class="field-input" id="srvHost" placeholder="proxy.example.com" type="text">
        </div>
        <div class="field-group">
          <label class="field-label">PORT</label>
          <input class="field-input" id="srvPort" placeholder="1080" type="number">
        </div>
      </div>

      <div class="field-row">
        <div class="field-group">
          <label class="field-label">USERNAME</label>
          <input class="field-input" id="srvUser" placeholder="(optional)" type="text">
        </div>
        <div class="field-group">
          <label class="field-label">PASSWORD</label>
          <input class="field-input" id="srvPass" placeholder="(optional)" type="password">
        </div>
      </div>

      <div class="field-row">
        <div class="field-group">
          <label class="field-label">PROTOCOL</label>
          <select class="field-select" id="srvProto">
            <option value="socks5">SOCKS5 (Recommended)</option>
            <option value="socks4">SOCKS4</option>
            <option value="https">HTTPS</option>
            <option value="http">HTTP</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">COUNTRY</label>
          <select class="field-select" id="srvCountry">
            <option value="">Select…</option>
          </select>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">SERVER LABEL (optional)</label>
        <input class="field-input" id="srvLabel" placeholder="e.g. My US Server #1" type="text">
      </div>

      <button class="save-server-btn" id="saveServerBtn">＋ SAVE & ACTIVATE SERVER</button>
    </div>

    <div class="saved-servers" id="savedServers"></div>
  </div>

  <!-- Panel: Stats -->
  <div class="panel" id="panel-stats">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">SESSION TIME</div>
        <div class="stat-value" id="statTime" style="font-size:14px">00:00:00</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">TOTAL SESSIONS</div>
        <div class="stat-value" id="statSessions">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">CURRENT SERVER</div>
        <div class="stat-value" style="font-size:12px" id="statServer">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">PROTOCOL</div>
        <div class="stat-value" id="statProtocol">—</div>
      </div>
    </div>

    <div class="leak-test-wrap">
      <button class="leak-test-btn" id="leakTestBtn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="width:14px;height:14px">
          <circle cx="8" cy="8" r="6.5"/>
          <path d="M8 5 V8 L10 10"/>
        </svg>
        Run DNS Leak Test
      </button>
      <div class="leak-result" id="leakResult"></div>
    </div>

    <!-- Quick toggles -->
    <div style="padding: 0 12px 10px; display:flex; flex-direction:column; gap:8px;">
      <div style="font-family:'Orbitron',monospace;font-size:8px;letter-spacing:0.15em;color:var(--text-dim);">QUICK SETTINGS</div>
      <label class="toggle-row" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;">
        <span style="font-size:13px;font-weight:600;color:var(--text);">Auto-connect on startup</span>
        <input type="checkbox" id="toggleAutoConnect" style="display:none;">
        <div class="toggle-switch" id="switchAutoConnect" style="width:36px;height:20px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;position:relative;transition:var(--transition);" onclick="toggleSwitch('autoConnect')">
          <div style="position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--text-muted);transition:var(--transition);" id="knobAutoConnect"></div>
        </div>
      </label>
      <label class="toggle-row" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;">
        <span style="font-size:13px;font-weight:600;color:var(--text);">Notifications</span>
        <div class="toggle-switch" id="switchNotifications" style="width:36px;height:20px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;position:relative;transition:var(--transition);" onclick="toggleSwitch('notifications')">
          <div style="position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--text-muted);transition:var(--transition);" id="knobNotifications"></div>
        </div>
      </label>
    </div>
  </div>

  <!-- Bottom bar -->
  <!-- FIX #7 — Version was v2.0.0, corrected to match manifest.json (v2.1.0) -->
  <div class="bottom-bar">
    <span class="bb-version">v2.1.0 · MV3</span>
    <div class="bb-actions">
      <a class="bb-link" id="openSettingsLink">Settings</a>
    </div>
  </div>

</div>

<div id="toast"></div>

<script src="countries.js" type="module"></script>
<script src="popup.js" type="module"></script>

</body>
</html>
